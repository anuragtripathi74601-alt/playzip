<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pool (8-Ball) — PlayZip</title>
<meta name="theme-color" content="#0A0A0F">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--gold:#C9A84C;--gold-light:#F0C96A;--bg:#0A0A0F;--bg2:#12121A;--bg3:#1A1A26;--text:#F0EBD8;--text2:#8A8578;--border:rgba(201,168,76,0.12);--green:#3ABE7A;--red:#E25C3A;--radius:10px}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;overflow-x:hidden}
  .header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:560px;padding:6px 0}
  .logo{font-size:18px;font-weight:800}.logo span{color:var(--gold)}
  .back-btn{color:var(--text2);text-decoration:none;font-size:13px;padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius);transition:all 0.2s}
  .back-btn:hover{color:var(--gold);border-color:var(--gold)}

  .game-layout{display:flex;flex-direction:column;align-items:center;width:100%;max-width:560px}

  .score-bar{display:flex;justify-content:space-between;width:100%;padding:4px 0;gap:6px;margin-bottom:4px}
  .score-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;text-align:center;flex:1;min-width:0}
  .score-box.active{border-color:var(--gold)}
  .score-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
  .score-value{font-size:13px;font-weight:700}
  .balls-row{display:flex;gap:1px;justify-content:center;flex-wrap:wrap;margin-top:2px;font-size:10px}

  .table-wrap{position:relative;width:100%;aspect-ratio:1.8;margin:2px 0;touch-action:none}
  .table{width:100%;height:100%;border-radius:60px/30px;background:linear-gradient(135deg,#1a7b3c,#0d5d2b);border:8px solid #5c3a1e;position:relative;overflow:hidden;box-shadow:inset 0 0 40px rgba(0,0,0,0.5),0 8px 32px rgba(0,0,0,0.4)}
  .table-inner{position:absolute;inset:6%;border:2px solid rgba(255,255,255,0.06);border-radius:40px/20px;pointer-events:none}

  .pocket{position:absolute;width:clamp(18px,4vw,26px);height:clamp(18px,4vw,26px);border-radius:50%;background:radial-gradient(circle at 30% 30%,#222,#000);box-shadow:inset 0 2px 4px rgba(0,0,0,0.8);z-index:1}
  .pocket:nth-child(1){top:-7px;left:-7px}.pocket:nth-child(2){top:-7px;left:50%;transform:translateX(-50%)}
  .pocket:nth-child(3){top:-7px;right:-7px}.pocket:nth-child(4){bottom:-7px;left:-7px}
  .pocket:nth-child(5){bottom:-7px;left:50%;transform:translateX(-50%)}.pocket:nth-child(6){bottom:-7px;right:-7px}

  #ball-container{position:absolute;inset:0;cursor:crosshair}
  .ball{position:absolute;width:clamp(13px,3.2vw,20px);height:clamp(13px,3.2vw,20px);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:inset -2px -2px 4px rgba(0,0,0,0.5),inset 2px 2px 4px rgba(255,255,255,0.15),0 1px 4px rgba(0,0,0,0.3);z-index:2;transition:left 0.05s,top 0.05s}
  .ball.hoverable{pointer-events:auto;cursor:pointer}
  .ball.ghost{opacity:0.5;z-index:3}
  .ball.potted{opacity:0;pointer-events:none;transition:opacity 0.3s}
  #cue-ball{cursor:pointer;z-index:5}
  #cue-ball:hover{box-shadow:0 0 12px rgba(201,168,76,0.3),inset -2px -2px 4px rgba(0,0,0,0.4)}
  #cue-ball.aiming{box-shadow:0 0 16px var(--gold),inset -2px -2px 4px rgba(0,0,0,0.4)}

.cue-stick-wrapper{position:absolute;pointer-events:none;z-index:4;opacity:0;transition:opacity 0.08s}
.cue-stick-wrapper.show{opacity:1}
.cue-stick{height:6px;background:linear-gradient(to right,#2A1A0A 0%,#5C3A1E 10%,#C4A44A 30%,#D4B44A 50%,#A0782C 70%,#5C3A1E 85%,#3A2510 100%);border-radius:3px 2px 2px 3px;position:relative;box-shadow:0 1px 4px rgba(0,0,0,0.3);width:200px}
.cue-stick::before{content:'';position:absolute;right:-3px;top:50%;transform:translateY(-50%);width:7px;height:8px;background:radial-gradient(circle at 40% 50%,#6A9BC5,#3A6B8A);border-radius:50%;box-shadow:inset 0 1px 2px rgba(255,255,255,0.3)}
.cue-stick::after{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:14px;height:7px;background:linear-gradient(to bottom,#2A1A0A,#3A2A1A);border-radius:2px 0 0 2px}
.ball.target-highlight{box-shadow:0 0 14px rgba(201,168,76,0.7),inset -2px -2px 4px rgba(0,0,0,0.4);animation:pulse-highlight 0.8s ease-in-out infinite}
@keyframes pulse-highlight{0%,100%{box-shadow:0 0 10px rgba(201,168,76,0.5)}50%{box-shadow:0 0 20px rgba(201,168,76,0.9)}}

  .power-section{width:100%;display:flex;align-items:center;gap:10px;padding:4px 0}
  .power-label{font-size:11px;color:var(--text2);white-space:nowrap;min-width:50px}
  .power-track{flex:1;height:6px;background:var(--bg3);border-radius:99px;overflow:hidden;cursor:pointer;position:relative}
  .power-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold),var(--red));border-radius:99px;width:50%;transition:width 0.05s;position:relative}
  .power-fill::after{content:'';position:absolute;right:-3px;top:-3px;width:12px;height:12px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px rgba(201,168,76,0.5)}
  .power-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--gold);min-width:32px;text-align:right}

  .controls{display:flex;gap:6px;width:100%;padding:6px 0;flex-wrap:wrap}
  .btn{padding:10px 18px;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;flex:1;min-width:72px;text-align:center}
  .btn:active{transform:scale(0.97)}
  .btn-primary{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:#000}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
  .btn-outline:hover{border-color:var(--gold);color:var(--gold)}
  .btn-red{background:rgba(226,92,58,0.15);color:var(--red);border:1px solid rgba(226,92,58,0.3)}

  .status-bar{width:100%;text-align:center;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-weight:500;margin:2px 0;min-height:44px;display:flex;align-items:center;justify-content:center}

  .game-over-overlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.7);z-index:20;border-radius:inherit;align-items:center;justify-content:center;flex-direction:column;gap:8px}
  .game-over-overlay.show{display:flex}
  .game-over-title{font-size:28px;font-weight:900;letter-spacing:-0.5px}
  .game-over-sub{font-size:14px;color:var(--text2)}

  .hint{font-size:10px;color:var(--text3);text-align:center;padding:2px 0}

  @media(max-width:400px){
    body{padding:8px}
    .table-wrap{border-radius:30px/15px}
    .table{border-width:5px;border-radius:40px/20px}
  }
  @media(min-width:560px){
    .game-layout{max-width:560px}
    .controls .btn{flex:0 1 auto}
  }
</style>
</head>
<body>  <div class="header">
  <a href="../app.html" class="back-btn">← Back</a>
  <div class="logo">Play<span>Zip</span> 🎱</div>
  <span class="back-btn" style="background:rgba(201,168,76,0.1);border-color:var(--gold);color:var(--gold);cursor:default">8-Ball</span>
  <button id="sound-toggle" class="sound-btn" onclick="toggleSound()" style="background:none;border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);font-size:16px;padding:6px 10px;cursor:pointer;transition:all 0.2s" title="Toggle Sound">🔊</button>
</div>

<div class="game-layout">

  <!-- SCOREBOARD -->
  <div class="score-bar">
    <div class="score-box active" id="player-box">
      <div class="score-label">You</div>
      <div class="score-value" id="player-name-display">🎱 Player</div>
      <div class="balls-row" id="player-balls-row"></div>
    </div>
    <div class="score-box" id="opp-box">
      <div class="score-label">Opponent</div>
      <div class="score-value" id="opp-name-display">🤖 AI</div>
      <div class="balls-row" id="opp-balls-row"></div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap" id="table-wrap">
    <div class="table">
      <div class="table-inner"></div>
      <div class="pocket"></div><div class="pocket"></div><div class="pocket"></div>
      <div class="pocket"></div><div class="pocket"></div><div class="pocket"></div>
      <div id="ball-container">
        <div class="cue-stick-wrapper" id="cue-stick-wrapper"><div class="cue-stick" id="cue-stick"></div></div>
        <div class="ball hoverable" id="cue-ball" style="left:25%;top:50%;background:radial-gradient(circle at 35% 35%,#fff,#ddd)"></div>
      </div>
      <div class="game-over-overlay" id="game-over-overlay">
        <div class="game-over-title" id="game-over-title">🏆 YOU WIN!</div>
        <div class="game-over-sub" id="game-over-sub">Perfect game!</div>
        <button class="btn btn-primary" onclick="resetGame()" style="margin-top:4px;flex:0;padding:10px 28px">🔄 Play Again</button>
      </div>
    </div>
  </div>

  <!-- POWER -->
  <div class="power-section">
    <span class="power-label">🔫 Power</span>
    <div class="power-track" id="power-track">
      <div class="power-fill" id="power-fill" style="width:50%"></div>
    </div>
    <span class="power-val" id="power-val">50%</span>
  </div>

  <!-- STATUS -->
  <div class="status-bar" id="status">🎱 Cue ball click karo, phir aim karo aur click karo!</div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="btn btn-primary" id="shoot-btn" onclick="shoot()">🎯 Shoot</button>
    <button class="btn btn-outline" onclick="resetGame()">🔄 New Rack</button>
    <button class="btn btn-outline" onclick="undoLast()">↩ Undo</button>
  </div>

  <div class="hint">🖱️ Move to aim • Click + drag backward to charge power • Release to shoot! ⬆️⬇️ Arrow keys for power</div>
</div>

<script>
// ============================================================
// Read URL params — MUST be at the top so all functions can use them
// ============================================================
const urlParams = new URLSearchParams(window.location.search);
const gameMode = urlParams.get('mode') || '1v1';
const gameLevel = urlParams.get('level') || 'free';
const gameFee = parseInt(urlParams.get('fee')) || 0;
const gamePayout = parseInt(urlParams.get('payout')) || 0;
if (gameMode) console.log(`Pool mode: ${gameMode}, Level: ${gameLevel}, Fee: ${gameFee}, Payout: ${gamePayout}`);

// ============================================================
// SOUND EFFECTS — Web Audio API
// ============================================================

let audioCtx = null;
let soundEnabled = true;

try { soundEnabled = localStorage.getItem('pz_sound_enabled') !== 'false'; } catch(e) {}

function toggleSound() {
  soundEnabled = !soundEnabled;
  try { localStorage.setItem('pz_sound_enabled', soundEnabled); } catch(e) {}
  const btn = document.getElementById('sound-toggle');
  if (btn) btn.textContent = soundEnabled ? '🔊' : '🔇';
  if (!soundEnabled && audioCtx) { try { audioCtx.suspend(); } catch(e) {} }
  if (soundEnabled && audioCtx && audioCtx.state === 'suspended') { try { audioCtx.resume(); } catch(e) {} }
}

function initAudio() {
  if (!soundEnabled) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch(e) {}
}

function playTone(freq, duration, type, volume) {
  try {
    initAudio();
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume || 0.15, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function playNoise(duration, volume) {
  try {
    initAudio();
    if (!audioCtx) return;
    const bufferSize = audioCtx.sampleRate * duration;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    }
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(volume || 0.08, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    source.connect(gain);
    gain.connect(audioCtx.destination);
    source.start();
  } catch(e) {}
}

function playHit() {
  playNoise(0.06, 0.12);
  playTone(180, 0.05, 'square', 0.06);
}

function playPocket() {
  playTone(300, 0.08, 'sine', 0.12);
  setTimeout(() => playTone(450, 0.12, 'sine', 0.1), 60);
  playNoise(0.1, 0.06);
}

function playWin() {
  const notes = [523, 659, 784, 1047];
  notes.forEach((f, i) => {
    setTimeout(() => playTone(f, 0.3, 'sine', 0.12), i * 120);
  });
  setTimeout(() => playTone(1047, 0.6, 'sine', 0.1), 480);
}

function playLose() {
  const notes = [400, 350, 300, 220];
  notes.forEach((f, i) => {
    setTimeout(() => playTone(f, 0.3, 'sine', 0.1), i * 150);
  });
}

function playCueShot() {
  playNoise(0.05, 0.1);
  playTone(200, 0.04, 'triangle', 0.08);
}

function playFoul() {
  playTone(200, 0.15, 'square', 0.08);
  setTimeout(() => playTone(160, 0.2, 'square', 0.06), 100);
}

// ============================================================
// POOL (8-Ball) — Full Game
// ============================================================

// Constants
const TABLE_W = 100, TABLE_H = 100;
const BALL_R = 2.0; // radius in percent
const FRICTION = 0.985;
const WALL_BOUNCE = 0.6;
const COLLISION_DAMP = 0.85;
const MAX_SPEED = 8;
const POCKET_R = 5.5; // pocket detection radius

const POCKETS = [[-1,-1],[50,-1],[101,-1],[-1,101],[50,101],[101,101]];

const SOLIDS = [1,2,3,4,5,6,7];
const STRIPES = [9,10,11,12,13,14,15];

const BALL_COLORS = {
  1:'#E8B84C',2:'#3A7BD5',3:'#E25C3A',4:'#7B4EA8',
  5:'#F57C00',6:'#2E7D32',7:'#991B1B',8:'#1A1A1A',
  9:'#F0C96A',10:'#5B99F0',11:'#E8734A',12:'#A78BFA',
  13:'#FFA726',14:'#4CAF50',15:'#DC2626'
};

// State
let balls = {};
let cue = {x:25, y:50, vx:0, vy:0};
let state = {
  phase: 'aim', // 'aim', 'shooting', 'moving', 'placing', 'gameover'
  turn: 'player', // 'player', 'ai'
  playerGroup: null, // 'solids', 'stripes', or null
  oppGroup: null,
  pottedThisTurn: [],
  foul: false,
  ballInHand: false,
  gameOver: false,
  winner: null,
  aimX: null, aimY: null,
  power: 50,
  shotCount: 0,
  playerPotted: 0,
  oppPotted: 0,
  placedCue: false
};

// Cue stick drag state
let cueDragState = {
  charging: false,
  lockX: null,
  lockY: null
};

// DOM refs
const $ = id => document.getElementById(id);
const ballContainer = $('ball-container');
const cueStickWrapper = $('cue-stick-wrapper');
const cueStick = $('cue-stick');
const cueBall = $('cue-ball');
const statusEl = $('status');
const powerFill = $('power-fill');
const powerVal = $('power-val');
const powerTrack = $('power-track');
const shootBtn = $('shoot-btn');

// ============================================================
// INIT
// ============================================================

function createBall(num, x, y) {
  const isStripe = STRIPES.includes(num);
  const color = BALL_COLORS[num] || '#fff';
  let bg;
  if (num === 8) {
    bg = 'radial-gradient(circle at 35% 35%, #555, #1a1a1a)';
  } else if (isStripe) {
    bg = `radial-gradient(circle at 35% 35%, #fff 38%, ${color} 42%)`;
  } else {
    bg = `radial-gradient(circle at 35% 35%, ${lighten(color)}, ${color})`;
  }
  return { num, x, y, vx:0, vy:0, potted:false, bg };
}

function rackBalls() {
  balls = {};
  const cx = 72, cy = 50;
  const sp = 4.3;
  // Order: 8-ball in center, solids and stripes alternating
  const order = [1,9,2,10,8,11,3,12,7,4,13,6,14,5,15];
  let idx = 0;
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col <= row; col++) {
      if (idx >= order.length) break;
      const num = order[idx++];
      const x = cx + row * sp;
      const y = cy - (row/2 * sp) + col * sp;
      balls[num] = createBall(num, x, y);
    }
  }
}

function initGame() {
  cue = {x:25, y:50, vx:0, vy:0};
  state = {
    phase: 'aim', turn: 'player', playerGroup: null, oppGroup: null,
    pottedThisTurn: [], foul: false, ballInHand: false,
    gameOver: false, winner: null, aimX: null, aimY: null,
    power: 50, shotCount: 0, playerPotted: 0, oppPotted: 0, placedCue: false
  };
  rackBalls();
  $('game-over-overlay').classList.remove('show');
  setStatus('🎱 Move mouse to aim • Click + drag to shoot!');
  updateScoreUI();
  render();
}

function resetGame() { initGame(); }

// ============================================================
// RENDER
// ============================================================

function render() {
  // Remove all balls except cue ball and cue line
  ballContainer.querySelectorAll('.ball:not(#cue-ball)').forEach(b => b.remove());

  // Render object balls
  Object.values(balls).forEach(b => {
    if (b.potted) return;
    const el = document.createElement('div');
    el.className = 'ball';
    el.style.left = b.x + '%';
    el.style.top = b.y + '%';
    el.style.background = b.bg;
    ballContainer.appendChild(el);
  });

  // Render cue ball
  if (!state.gameOver) {
    cueBall.style.left = cue.x + '%';
    cueBall.style.top = cue.y + '%';
    cueBall.classList.toggle('aiming', state.phase === 'aim');
    cueBall.style.display = 'block';
  } else {
    cueBall.style.display = 'none';
  }

  // Render cue stick
  renderCueStick();
  
  // Render target highlight
  renderTargetHighlight();
}

// ============================================================
// CUE STICK RENDERING & TARGET HIGHLIGHT
// ============================================================

function renderCueStick() {
  if (!cueStickWrapper || !cueStick) return;

  if (state.gameOver || state.turn !== 'player' || state.phase === 'moving' || state.ballInHand || state.aimX === null) {
    cueStickWrapper.classList.remove('show');
    return;
  }

  const dx = state.aimX - cue.x;
  const dy = state.aimY - cue.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 0.5) {
    cueStickWrapper.classList.remove('show');
    return;
  }

  const angle = Math.atan2(dy, dx) * (180 / Math.PI);

  // Position wrapper at cue ball center
  // transform-origin: right center means RIGHT edge of stick is at the cue ball
  // Stick extends to the LEFT (away from aim direction)
  cueStickWrapper.style.left = cue.x + '%';
  cueStickWrapper.style.top = cue.y + '%';
  cueStickWrapper.style.transform = `rotate(${angle}deg)`;

  // If charging, pull the stick back (translate left = away from cue ball)
  if (cueDragState.charging) {
    const pull = (state.power / 100) * 70; // max 70px pull back
    cueStick.style.transform = `translateX(${-pull}px)`;
  } else {
    cueStick.style.transform = 'translateX(0)';
  }

  cueStickWrapper.classList.add('show');
}

function findTargetBall(aimX, aimY) {
  // Find the ball closest to the aim line from cue ball
  const dx = aimX - cue.x;
  const dy = aimY - cue.y;
  const lineLen = Math.sqrt(dx*dx + dy*dy);
  if (lineLen < 0.1) return null;
  
  const nx = dx / lineLen;
  const ny = dy / lineLen;
  
  let closest = null;
  let closestDist = Infinity;
  
  Object.values(balls).forEach(b => {
    if (b.potted) return;
    // Vector from cue ball to this ball
    const bx = b.x - cue.x;
    const by = b.y - cue.y;
    const bLen = Math.sqrt(bx*bx + by*by);
    if (bLen < 0.1) return;
    // Project ball vector onto aim direction
    const proj = (bx * nx + by * ny);
    if (proj < 0) return; // ball is behind cue ball
    // Perpendicular distance from aim line to ball center
    const perpDist = Math.abs(bx * ny - by * nx);
    if (perpDist < BALL_R * 2.5 && proj < closestDist) {
      closest = b;
      closestDist = proj;
    }
  });
  
  return closest;
}

function renderTargetHighlight() {
  // Remove existing highlights
  ballContainer.querySelectorAll('.ball.target-highlight').forEach(el => el.classList.remove('target-highlight'));
  
  if (state.gameOver || state.turn !== 'player' || state.aimX === null || state.ballInHand) return;
  if (state.phase === 'moving') return;
  
  const target = findTargetBall(state.aimX, state.aimY);
  if (!target) return;
  
  // Find the DOM element for this ball and highlight it
  ballContainer.querySelectorAll('.ball:not(#cue-ball):not(.potted)').forEach(el => {
    const elLeft = parseFloat(el.style.left);
    const elTop = parseFloat(el.style.top);
    if (Math.abs(elLeft - target.x) < 0.5 && Math.abs(elTop - target.y) < 0.5) {
      el.classList.add('target-highlight');
    }
  });
}

// ============================================================
// AIMING — Mouse/Touch
// ============================================================

function getTablePos(e) {
  const rect = ballContainer.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: ((clientX - rect.left) / rect.width) * 100,
    y: ((clientY - rect.top) / rect.height) * 100
  };
}

function isOnTable(pos) {
  return pos.x > 2 && pos.x < 98 && pos.y > 2 && pos.y < 98;
}

// Check if position is valid for ball placement (not on other balls)
function isValidPlacement(pos) {
  if (!isOnTable(pos)) return false;
  for (const b of Object.values(balls)) {
    if (!b.potted && Math.sqrt((pos.x-b.x)**2 + (pos.y-b.y)**2) < BALL_R*2.5) return false;
  }
  return true;
}

// -----------------------------------------------------------
// MOUSE EVENTS: Move → aim preview | Click+Drag → charge & shoot
// -----------------------------------------------------------

// Mouse move — always update aim direction (preview mode)
ballContainer.addEventListener('mousemove', function(e) {
  if (state.gameOver || state.turn !== 'player') return;
  if (state.phase === 'moving') return;
  
  if (cueDragState.charging) {
    // Dragging to set power — distance from lock point determines power
    const pos = getTablePos(e);
    if (!isOnTable(pos)) return;
    const dx = pos.x - cueDragState.lockX;
    const dy = pos.y - cueDragState.lockY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const power = Math.min(100, (dist / 25) * 100);
    setPower(power);
    render();
  } else {
    // Free aim — cue stick follows mouse
    const pos = getTablePos(e);
    if (!isOnTable(pos)) return;
    state.aimX = pos.x;
    state.aimY = pos.y;
    state.phase = 'aim';
    setStatus('🎯 Mouse move to aim • Click + drag backward to charge power • Release to shoot!');
    render();
  }
});

// Mouse down — handle ball-in-hand or lock aim direction and start charging
ballContainer.addEventListener('mousedown', function(e) {
  if (state.gameOver || state.turn !== 'player') return;
  if (e.button !== 0) return; // left click only
  
  // Ball-in-hand: place cue ball on click
  if (state.ballInHand) {
    const pos = getTablePos(e);
    if (isValidPlacement(pos)) {
      cue.x = pos.x;
      cue.y = pos.y;
      state.ballInHand = false;
      state.placedCue = true;
      state.phase = 'aim';
      setStatus('🎯 Cue ball placed! Aim karo.');
      render();
    }
    return;
  }
  
  if (state.phase === 'moving') return;
  
  const pos = getTablePos(e);
  if (!isOnTable(pos)) return;
  
  // Lock aim and start charging
  cueDragState.charging = true;
  cueDragState.lockX = pos.x;
  cueDragState.lockY = pos.y;
  state.aimX = pos.x;
  state.aimY = pos.y;
  state.phase = 'aim';
  setPower(0);
  setStatus('🔫 Drag to set power, release to shoot!');
  render();
});

// Global mouse up — release to shoot
document.addEventListener('mouseup', function(e) {
  if (cueDragState.charging) {
    cueDragState.charging = false;
    if (state.power > 5) {
      shoot();
    } else {
      setStatus('🎯 Mouse move to aim • Click + drag to shoot with power!');
      render();
    }
  }
});

// -----------------------------------------------------------
// TOUCH EVENTS: Touch → aim + charge | Drag → power | Release → shoot
// -----------------------------------------------------------

ballContainer.addEventListener('touchstart', function(e) {
  if (state.gameOver || state.turn !== 'player') return;
  const pos = getTablePos(e);

  if (state.ballInHand) {
    if (isValidPlacement(pos)) {
      cue.x = pos.x;
      cue.y = pos.y;
      state.ballInHand = false;
      state.placedCue = true;
      state.phase = 'aim';
      setStatus('🎯 Cue ball placed! Tap to aim.');
      render();
    }
    return;
  }
  
  if (!isOnTable(pos)) return;
  
  // Start charging immediately on touch (no preview mode on mobile)
  cueDragState.charging = true;
  cueDragState.lockX = pos.x;
  cueDragState.lockY = pos.y;
  state.aimX = pos.x;
  state.aimY = pos.y;
  state.phase = 'aim';
  setPower(0);
  setStatus('🔫 Drag to set power, release to shoot!');
  render();
}, {passive: true});

ballContainer.addEventListener('touchmove', function(e) {
  if (!cueDragState.charging) return;
  const pos = getTablePos(e);
  if (!isOnTable(pos)) return;
  
  const dx = pos.x - cueDragState.lockX;
  const dy = pos.y - cueDragState.lockY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const power = Math.min(100, (dist / 25) * 100);
  setPower(power);
  render();
}, {passive: true});

ballContainer.addEventListener('touchend', function(e) {
  if (cueDragState.charging) {
    cueDragState.charging = false;
    if (state.power > 5) {
      shoot();
    }
  }
});

// ============================================================
// POWER CONTROL
// ============================================================

function setPower(val) {
  state.power = Math.max(5, Math.min(100, val));
  powerFill.style.width = state.power + '%';
  powerVal.textContent = Math.round(state.power) + '%';
}

powerTrack.addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  const pct = ((e.clientX - rect.left) / rect.width) * 100;
  setPower(pct);
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowUp') { setPower(state.power + 5); e.preventDefault(); }
  if (e.key === 'ArrowDown') { setPower(state.power - 5); e.preventDefault(); }
  if (e.key === 'Enter' || e.key === ' ') { shoot(); e.preventDefault(); }
});

// ============================================================
// SHOOT
// ============================================================

function shoot() {
  if (state.gameOver) return;
  if (state.turn !== 'player') { setStatus('⏳ Opponent ka turn hai!'); return; }
  if (state.phase === 'shooting' || state.phase === 'moving') return;
  if (state.ballInHand) { setStatus('⚠️ Pehle cue ball place karo!'); return; }
  if (state.aimX === null) { setStatus('⚠️ Pehle aim karo — table pe click karo!'); return; }

  // Calculate velocity from aim direction
  const dx = state.aimX - cue.x;
  const dy = state.aimY - cue.y;
  const len = Math.sqrt(dx*dx + dy*dy);
  if (len < 0.5) { setStatus('⚠️ Zyada paas hai — door click karo!'); return; }

  const speed = (state.power / 100) * MAX_SPEED;
  cue.vx = (dx / len) * speed;
  cue.vy = (dy / len) * speed;

  playCueShot();

  state.phase = 'moving';
  state.aimX = null;
  state.pottedThisTurn = [];
  state.foul = false;
  state.placedCue = false;
  shootBtn.disabled = true;
  cueStickWrapper.classList.remove('show');

  render();
  requestAnimationFrame(physicsLoop);
}

// ============================================================
// PHYSICS
// ============================================================

function physicsLoop() {
  let anyMoving = Math.abs(cue.vx) > 0.01 || Math.abs(cue.vy) > 0.01;

  // Move cue ball
  if (anyMoving) {
    cue.x += cue.vx;
    cue.y += cue.vy;
    cue.vx *= FRICTION;
    cue.vy *= FRICTION;

    // Wall bounce
    if (cue.x < BALL_R) { cue.x = BALL_R; cue.vx = -cue.vx * WALL_BOUNCE; }
    if (cue.x > 100 - BALL_R) { cue.x = 100 - BALL_R; cue.vx = -cue.vx * WALL_BOUNCE; }
    if (cue.y < BALL_R) { cue.y = BALL_R; cue.vy = -cue.vy * WALL_BOUNCE; }
    if (cue.y > 100 - BALL_R) { cue.y = 100 - BALL_R; cue.vy = -cue.vy * WALL_BOUNCE; }

    // Pocket check for cue ball
    for (const [px, py] of POCKETS) {
      if (Math.sqrt((cue.x-px)**2 + (cue.y-py)**2) < POCKET_R) {
        cue.vx = 0; cue.vy = 0;
        state.foul = true;
        // Opponent gets ball-in-hand after scratch (standard 8-ball rules)
        state.ballInHand = true;
        cue.x = 25; cue.y = 50;
        playFoul();
        setStatus('❌ Scratch! Cue ball pocketed. Opponent gets ball-in-hand!');
        endShot();
        return;
      }
    }
  }

  // Move object balls
  Object.values(balls).forEach(b => {
    if (b.potted) return;
    if (Math.abs(b.vx) > 0.01 || Math.abs(b.vy) > 0.01) {
      anyMoving = true;
      b.x += b.vx;
      b.y += b.vy;
      b.vx *= FRICTION;
      b.vy *= FRICTION;

      if (Math.abs(b.vx) < 0.005) b.vx = 0;
      if (Math.abs(b.vy) < 0.005) b.vy = 0;

      // Wall bounce
      if (b.x < BALL_R) { b.x = BALL_R; b.vx = -b.vx * WALL_BOUNCE; }
      if (b.x > 100 - BALL_R) { b.x = 100 - BALL_R; b.vx = -b.vx * WALL_BOUNCE; }
      if (b.y < BALL_R) { b.y = BALL_R; b.vy = -b.vy * WALL_BOUNCE; }
      if (b.y > 100 - BALL_R) { b.y = 100 - BALL_R; b.vy = -b.vy * WALL_BOUNCE; }

      // Pocket check
      for (const [px, py] of POCKETS) {
        if (Math.sqrt((b.x-px)**2 + (b.y-py)**2) < POCKET_R) {
          b.potted = true;
          b.vx = 0; b.vy = 0;
          state.pottedThisTurn.push(b.num);
          playPocket();
          break;
        }
      }
    }
  });

  // Ball-ball collisions
  Object.values(balls).forEach(b1 => {
    if (b1.potted) return;
    Object.values(balls).forEach(b2 => {
      if (b2.potted || b2.num <= b1.num) return;
      const dx = b2.x - b1.x;
      const dy = b2.y - b1.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const minDist = BALL_R * 2;
      if (dist < minDist && dist > 0.01) {
        const nx = dx / dist, ny = dy / dist;
        const overlap = minDist - dist;
        b1.x -= nx * overlap / 2;
        b1.y -= ny * overlap / 2;
        b2.x += nx * overlap / 2;
        b2.y += ny * overlap / 2;
        const relVx = b1.vx - b2.vx;
        const relVy = b1.vy - b2.vy;
        const relVn = relVx * nx + relVy * ny;
        if (relVn > 0) {
          b1.vx -= relVn * nx * COLLISION_DAMP;
          b1.vy -= relVn * ny * COLLISION_DAMP;
          b2.vx += relVn * nx * COLLISION_DAMP;
          b2.vy += relVn * ny * COLLISION_DAMP;
          playHit();
        }
      }
    });
    // Cue ball collisions
    if (!state.foul) {
      const dx = b1.x - cue.x;
      const dy = b1.y - cue.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const minDist = BALL_R * 2;
      if (dist < minDist && dist > 0.01 && !b1.potted && (Math.abs(cue.vx) > 0.01 || Math.abs(cue.vy) > 0.01)) {
        const nx = dx / dist, ny = dy / dist;
        const overlap = minDist - dist;
        b1.x += nx * overlap;
        b1.y += ny * overlap;
        cue.x -= nx * overlap;
        cue.y -= ny * overlap;
        const relVx = cue.vx - b1.vx;
        const relVy = cue.vy - b1.vy;
        const relVn = relVx * nx + relVy * ny;
        if (relVn > 0) {
          cue.vx -= relVn * nx * COLLISION_DAMP;
          cue.vy -= relVn * ny * COLLISION_DAMP;
          b1.vx += relVn * nx * COLLISION_DAMP;
          b1.vy += relVn * ny * COLLISION_DAMP;
          playHit();
        }
      }
    }
  });

  render();

  if (anyMoving && Math.abs(cue.vx) + Math.abs(cue.vy) + 
    Object.values(balls).reduce((s,b) => s + Math.abs(b.vx) + Math.abs(b.vy), 0) > 0.02) {
    requestAnimationFrame(physicsLoop);
  } else {
    // Stop everything
    cue.vx = 0; cue.vy = 0;
    Object.values(balls).forEach(b => { b.vx = 0; b.vy = 0; });
    endShot();
  }
}

// ============================================================
// SHOT RESOLUTION
// ============================================================

function endShot() {
  state.phase = 'idle';
  shootBtn.disabled = false;

  const potted = state.pottedThisTurn;
  state.shotCount++;

  if (state.foul) {
    updateScoreUI();
    render();
    // Foul — opponent (AI) gets ball-in-hand
    turnAfterFoul();
    return;
  }

  // Check if 8-ball was potted
  if (potted.includes(8)) {
    if (state.playerGroup) {
      const myBalls = state.playerGroup === 'solids' ? SOLIDS : STRIPES;
      const allCleared = myBalls.every(n => balls[n]?.potted);
      if (allCleared) {
        gameOver('player');
      } else {
        gameOver('opponent', '💀 Pehle apne saare balls pot karo phir 8-ball!');
      }
    } else {
      if (potted.length === 1) {
        gameOver('player', '🏆 8-ball on the break! Amazing!');
      } else {
        gameOver('opponent', '💀 8-ball potted early!');
      }
    }
    return;
  }

  // Assign groups on first pot (not including 8-ball)
  if (!state.playerGroup && potted.length > 0) {
    const firstPot = potted[0];
    if (SOLIDS.includes(firstPot)) {
      state.playerGroup = 'solids';
      state.oppGroup = 'stripes';
    } else {
      state.playerGroup = 'stripes';
      state.oppGroup = 'solids';
    }
    setStatus(`🎯 You're ${state.playerGroup === 'solids' ? 'Solids (1-7)' : 'Stripes (9-15)'}!`);
  }

  // Check if player potted their own ball
  if (state.playerGroup && potted.length > 0) {
    const myBalls = state.playerGroup === 'solids' ? SOLIDS : STRIPES;
    const pottedOwn = potted.filter(n => myBalls.includes(n));
    const pottedOpp = potted.filter(n => (state.oppGroup||[]).includes(n));
    if (pottedOwn.length > 0) {
      state.playerPotted += pottedOwn.length;
      const myLeft = myBalls.filter(n => balls[n] && !balls[n].potted).length;
      if (myLeft === 0) {
        setStatus('🎯 All your balls potted! Now pot the 8-ball!');
      } else {
        setStatus(`✅ ${pottedOwn.length} ball(s) potted! Continue!`);
      }
      if (myLeft === 0 && potted.includes(8)) {
        gameOver('player');
        return;
      }
      updateScoreUI();
      render();
      return; // Continue turn
    } else if (pottedOpp.length > 0) {
      setStatus(`❌ Opponent's ball potted! Turn over.`);
    } else if (potted.length > 0) {
      setStatus(`❌ Wrong ball! Turn over.`);
    }
  } else if (!state.playerGroup && potted.length > 0) {
    // First pot happened, continue turn
    updateScoreUI();
    render();
    return;
  }

  if (potted.length === 0) {
    setStatus('❌ No ball potted. Turn over.');
  }

  updateScoreUI();
  render();
  endTurn();
}

function turnAfterFoul() {
  // After a foul in 8-ball, the opponent gets ball-in-hand
  state.turn = 'opponent';
  state.ballInHand = true;
  state.aimX = null;
  state.phase = 'idle';
  $('player-box').classList.remove('active');
  $('opp-box').classList.add('active');
  setStatus('🤖 AI ball-in-hand...');
  setTimeout(() => aiPlaceCueBall(), 500);
}

function endTurn() {
  state.turn = 'opponent';
  state.aimX = null;
  state.phase = 'idle';
  $('player-box').classList.remove('active');
  $('opp-box').classList.add('active');
  setStatus('🤖 AI ka turn...');
  setTimeout(aiTurn, 800);
}

// ============================================================
// AI — Ball-in-hand placement
// ============================================================

function aiPlaceCueBall() {
  if (state.gameOver) return;
  // AI places the cue ball at a strategic position
  // Usually behind the head string, near the center
  cue.x = 20 + Math.random() * 10;
  cue.y = 30 + Math.random() * 40;
  
  // Make sure placement is valid
  let attempts = 0;
  while (!isValidPlacement({x: cue.x, y: cue.y}) && attempts < 20) {
    cue.x = 18 + Math.random() * 14;
    cue.y = 25 + Math.random() * 50;
    attempts++;
  }
  
  state.ballInHand = false;
  render();
  setStatus('🤖 AI placed cue ball...');
  setTimeout(aiTurn, 500);
}

// ============================================================
// AI
// ============================================================

function aiTurn() {
  if (state.gameOver) return;

  // AI determines its group
  if (!state.oppGroup && state.playerGroup) {
    state.oppGroup = state.playerGroup === 'solids' ? 'stripes' : 'solids';
  }

  const aiGroup = state.oppGroup || 'solids';
  const myBalls = aiGroup === 'solids' ? SOLIDS : STRIPES;
  const targetBalls = myBalls.filter(n => balls[n] && !balls[n].potted);

  // Random shot success (adjusted for difficulty)
  const success = Math.random() < 0.4;
  let pottedThisAI = [];

  if (success && targetBalls.length > 0) {
    // Pot a random ball from AI's group
    const target = targetBalls[Math.floor(Math.random() * targetBalls.length)];
    balls[target].potted = true;
    pottedThisAI.push(target);
    state.oppPotted++;

    const remaining = myBalls.filter(n => balls[n] && !balls[n].potted).length;
    if (remaining === 0) {
      // Try to pot 8-ball
      if (Math.random() < 0.3) {
        balls[8].potted = true;
        gameOver('opponent', '🤖 AI potted the 8-ball!');
        return;
      }
    }
    setStatus(`🤖 AI potted a ball! ${remaining} remaining.`);
    state.turn = 'opponent';
    updateScoreUI();
    render();

    // AI continues if it potted its own ball
    if (remaining > 0 && Math.random() < 0.3) {
      setTimeout(aiTurn, 600);
      return;
    }
  } else {
    const foulAI = Math.random() < 0.15;
    if (foulAI) {
      setStatus('🤖 AI scratch! Ball-in-hand for you!');
      state.ballInHand = true;
      state.turn = 'player';
      $('player-box').classList.add('active');
      $('opp-box').classList.remove('active');
      updateScoreUI();
      render();
      setStatus('🎱 Ball-in-hand! Cue ball place karo!');
      return;
    }
    setStatus('🤖 AI missed! Your turn!');
  }

  // Switch to player
  state.turn = 'player';
  $('player-box').classList.add('active');
  $('opp-box').classList.remove('active');
  state.phase = 'aim';
  state.aimX = null;
  updateScoreUI();
  render();
  setStatus(state.ballInHand ? '🎱 Ball-in-hand! Cue ball place karo!' : '🎱 Your turn! Mouse move to aim, click+drag to shoot!');
}

// ============================================================
// GAME RESULT — Save to localStorage for app.html to read
// ============================================================

function saveGameResult(winner) {
  const result = {
    game: 'pool',
    result: winner === 'player' ? 'win' : 'lose',
    level: gameLevel,
    fee: gameFee,
    payout: winner === 'player' ? gamePayout : 0,
    mode: gameMode
  };
  try {
    localStorage.setItem('pz_game_result', JSON.stringify(result));
  } catch(e) {}
}

// ============================================================
// GAME OVER
// ============================================================

function gameOver(winner, msg) {
  saveGameResult(winner);
  
  if (winner === 'player') playWin();
  else playLose();
  
  state.gameOver = true;
  state.phase = 'gameover';
  state.winner = winner;
  $('game-over-overlay').classList.add('show');
  if (winner === 'player') {
    $('game-over-title').textContent = '🏆 YOU WIN!';
    $('game-over-sub').textContent = msg || 'Excellent shooting! 🎉' + (gamePayout ? ` Won ₹${gamePayout}!` : '');
  } else {
    $('game-over-title').textContent = '💀 YOU LOSE';
    $('game-over-sub').textContent = msg || 'Better luck next time!';
  }
  setStatus(msg || (winner === 'player' ? '🏆 Congratulations! You win!' : '💀 Game over!'));
  render();
}

// ============================================================
// UI UPDATES
// ============================================================

function updateScoreUI() {
  const myBalls = state.playerGroup === 'solids' ? SOLIDS : STRIPES;
  const oppBalls = state.oppGroup === 'solids' ? SOLIDS : STRIPES;

  const myLeft = myBalls ? myBalls.filter(n => balls[n] && !balls[n].potted).length : '—';
  const oppLeft = oppBalls ? oppBalls.filter(n => balls[n] && !balls[n].potted).length : '—';

  $('player-name-display').textContent = '🎱 You' + (state.playerGroup ? ` (${state.playerGroup === 'solids' ? 'Solids' : 'Stripes'})` : '');
  $('opp-name-display').textContent = '🤖 AI' + (state.oppGroup ? ` (${state.oppGroup === 'solids' ? 'Solids' : 'Stripes'})` : '');

  if (myBalls) {
    $('player-balls-row').textContent = myBalls.filter(n => balls[n] && !balls[n].potted)
      .map(n => n === 8 ? '⚫' : (SOLIDS.includes(n) ? '●' : '○')).join(' ');
  } else {
    $('player-balls-row').textContent = '—';
  }
  if (oppBalls) {
    $('opp-balls-row').textContent = oppBalls.filter(n => balls[n] && !balls[n].potted)
      .map(n => n === 8 ? '⚫' : (SOLIDS.includes(n) ? '●' : '○')).join(' ');
  } else {
    $('opp-balls-row').textContent = '—';
  }
}

function setStatus(msg) {
  statusEl.textContent = msg;
}

function undoLast() {
  if (state.phase === 'idle' || state.phase === 'aim') {
    cue.x = 25; cue.y = 50;
    cue.vx = 0; cue.vy = 0;
    state.aimX = null;
    cueStickWrapper.classList.remove('show');
    render();
    setStatus('↩ Cue ball reset!');
  }
}

function lighten(hex) {
  if (!hex || hex === '#fff' || hex === '#1A1A1A' || hex === '#1a1a1a' || hex === '#ddd') return hex;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`;
}

// ============================================================
// START
// ============================================================

initGame();
setPower(50);
// Sync sound toggle button state
if (!soundEnabled) {
  const sBtn = document.getElementById('sound-toggle');
  if (sBtn) sBtn.textContent = '🔇';
}

console.log('🎱 Pool (8-Ball) — Full Game Loaded');
